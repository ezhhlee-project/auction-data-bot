name: Daily Auction Data Sync

on:
  schedule:
    # UTC 기준 03:30 (한국 시각 점심 12:30)
    - cron: '30 3 * * *'
  workflow_dispatch: # 수동으로도 실행 가능하게 설정

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      env:
        API_KEY: ${{ secrets.API_KEY }}
        GCP_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      run: python main.py
